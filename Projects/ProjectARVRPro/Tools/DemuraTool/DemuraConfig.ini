# Demura Tool Configuration
# Generated by DemuraTool

[Size]
# 输入尺寸 (CSV数据尺寸)
input_width = 640
input_height = 480
# 输出尺寸 (目标bin尺寸)
output_width = 660
output_height = 504

[Demura]
# Block模式: 0=1x1, 1=2x1, 2=1x2
block_mode = 0
# 填充方式: 0=补0, 1=复制边缘, 2=复制最后一行/列
padding_mode = 2

[Paths]
# CSV文件夹路径 (程序自动识别目录下 G128.csv 和 G255.csv)
csv_dir = csv
# CSV文件名 (自动，无需修改)
csv_128 = G128.csv
csv_255 = G255.csv
# 输出bin文件路径
static_bin = DemuraStatic.bin
dynamic_bin = DemuraDynamic.bin

# [StaticCoefficients] 可选，不配置则使用公版参数
# point_0 = 112,256,1023,1023,1023,1023,1023
# slope_0 = 73,57,0,0,0,9,64,64
# scaler_0 = 4095,4095,4095,4095,4095,4095,4095
# type2_0 = 1024,0,22
