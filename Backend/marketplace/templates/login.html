{% extends "base.html" %}
{% block title %}登录 — ColorVision{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-sm-10 col-md-6 col-lg-4">
        <section class="panel-card p-4">
            <div class="text-center mb-3">
                <div class="brand-mark mx-auto mb-2" style="width:2.5rem;height:2.5rem;font-size:1.1rem">
                    <i class="bi bi-palette"></i>
                </div>
                <h1 class="h5 mb-1">ColorVision 内部门户</h1>
                <p class="text-muted small mb-0">请登录以访问发布功能</p>
            </div>

            {% if error %}
            <div class="alert alert-danger py-2"><i class="bi bi-exclamation-circle me-1"></i>{{ error }}</div>
            {% endif %}

            <form method="post">
                <input type="hidden" name="next" value="{{ next_url }}">
                <div class="mb-3">
                    <label for="username" class="form-label">用户名</label>
                    <input type="text" class="form-control" id="username" name="username" required autofocus>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">密码</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100"><i class="bi bi-box-arrow-in-right me-1"></i>登录</button>
            </form>
        </section>
    </div>
</div>
{% endblock %}
